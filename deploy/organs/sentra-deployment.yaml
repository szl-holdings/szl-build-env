# Doctrine v11 LOCKED 749/14/163 · Lambda Conjecture 1 · SLSA L1 honest
# sentra organ Deployment — cosign private key mounted as an ENV VAR (not a file).
# The secret is optional: when absent the organ emits honest UNSIGNED receipts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentra
  namespace: szl
  labels:
    app.kubernetes.io/name: sentra
    app.kubernetes.io/part-of: szl-organs
    szl.holdings/doctrine: v11-749-14-163
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentra
        app.kubernetes.io/part-of: szl-organs
    spec:
      containers:
        - name: sentra
          image: ghcr.io/szl-holdings/sentra:uds-v0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # ---- Cosign DSSE signing key (runtime secret) -------------------
            # Canonical name read first by szl_dsse._load_private_key().
            # optional: true => if the secret is not set, the organ falls back
            # to honest UNSIGNED receipts (signatures: []) — never fabricated.
            - name: SZL_COSIGN_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: szl-cosign
                  key: cosign.key
                  optional: true   # honest fallback
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
