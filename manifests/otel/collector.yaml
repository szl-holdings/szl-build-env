# OpenTelemetry Collector config — cross-pod OTLP broker for the 5-organ stack.
# Organs (and the Istio ambient mesh) export OTLP here; the collector forwards to
# Jaeger so one traceparent is visible end-to-end across all organs.
#
# DSSE-aware processor: OTTL/YAML cannot run crypto in-path, so the `transform`
# processor below only PROMOTES the `szl.dsse.receipt` / `szl.dsse.predecessor`
# span attributes (making the receipt chain queryable in Jaeger) and labels them
# `pending-sidecar-verify`. The AUTHORITATIVE ECDSA-P256-SHA256 verification is
# performed by the real verify hook `verify/dsse_verify.py` (reuses szl-receipt's
# primitive), which the pipeline calls with `keys/cosign.pub`. It emits honest
# verdicts: verified | unsigned-honest | FAIL (loud). See HONEST_GAPS.md § DSSE.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
  # --- DSSE-aware processor -------------------------------------------------
  # Promotes DSSE receipt attributes so the receipt chain is visible per-span.
  # OTTL cannot verify signatures in-path; the real ECDSA-P256 verification is
  # done by verify/dsse_verify.py (reuses szl-receipt). This stage only flags the
  # receipt as awaiting that authoritative verify, plus a hook pointer.
  transform/dsse:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["szl.dsse.verified"], "pending-sidecar-verify") where attributes["szl.dsse.receipt"] != nil
          - set(attributes["szl.dsse.verify_hook"], "verify/dsse_verify.py") where attributes["szl.dsse.receipt"] != nil
          - set(attributes["szl.doctrine"], "v11-749-14-163-c7c0ba17")
  resource:
    attributes:
      - { key: deployment.environment, value: szl-build-env, action: upsert }

exporters:
  # Jaeger now ingests OTLP natively (COLLECTOR_OTLP_ENABLED=true).
  otlp/jaeger:
    endpoint: jaeger.szl.svc:4317
    tls:
      insecure: true
  debug:
    verbosity: normal
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, transform/dsse, batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus, debug]
