# Istio ambient waypoint — L7 routing for inter-organ traffic.
# In ambient mode, ztunnel gives us L4 mTLS for free across the namespace.
# A waypoint proxy adds L7 (HTTP route, retries, traceparent header handling)
# WITHOUT injecting a sidecar into every organ pod. This is the doctrine-correct
# alternative to sidecar mesh: one waypoint, not 5 sidecars.
#
# The waypoint is requested via the Kubernetes Gateway API. Istio reconciles it
# into a deployed waypoint proxy bound to the 'szl' namespace.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: szl-waypoint
  namespace: szl
  labels:
    istio.io/waypoint-for: service   # waypoint handles service-addressed traffic for all organs
  annotations:
    szl.doctrine: "v11-749-14-163-c7c0ba17"
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE   # Istio ambient HBONE tunnel (mTLS L4 + L7 via waypoint)
---
# Route that ensures W3C traceparent is preserved and propagated across organs.
# (Istio propagates incoming trace headers by default; this HTTPRoute makes the
# inter-organ topology explicit and gives us a place to assert retries/timeouts.)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: organ-mesh-routes
  namespace: szl
spec:
  parentRefs:
    - name: szl-waypoint
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      timeouts:
        request: 10s
      # No header stripping — traceparent / tracestate pass through unmodified
      # so the OTLP collector can stitch the cross-organ trace.
      backendRefs:
        - name: a11oy
          port: 8080
