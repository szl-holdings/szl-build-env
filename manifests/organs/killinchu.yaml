# Organ Deployment: killinchu
# Image: ghcr.io/szl-holdings/killinchu:uds-v0.2.0 (from bundle oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0)
# Supply-chain gate: initContainer runs cosign verify + slsa-verifier. FAIL-CLOSED.
# !!! HONEST GAP: the killinchu image is PRIVATE on GHCR. Until the founder flips
# !!! ghcr.io/szl-holdings/killinchu to public (or a pull secret is added), this
# !!! Deployment will ImagePullBackOff. This is EXPECTED. See HONEST_GAPS.md and
# !!! FOUNDER_BUILD_ENV.md. Do NOT assume killinchu is public.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: killinchu
  namespace: szl
  labels:
    app: killinchu
    szl.organ: "killinchu"
    szl.doctrine: "v11-749-14-163-c7c0ba17"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: killinchu
  template:
    metadata:
      labels:
        app: killinchu
        szl.organ: "killinchu"
    spec:
      # cosign public key for the supply-chain gate (NOT a secret — public key only)
      volumes:
        - name: cosign-pub
          configMap:
            name: szl-cosign-pub
      initContainers:
        - name: cosign-gate
          image: ghcr.io/sigstore/cosign/cosign:v2.4.1
          # Keyless (Fulcio) verify. The cosign distroless image has no shell, so we
          # run its `cosign` entrypoint directly via args (no /bin/sh). The pod fails
          # to start unless the signature verifies against the organ's ghcr-build-push
          # workflow identity. Authoritative host gate: verify/cosign-init.sh.
          args:
            - "verify"
            - "--certificate-identity-regexp"
            - '^https://github\.com/szl-holdings/killinchu/\.github/workflows/ghcr-build-push\.yml@refs/(heads/main|tags/.*)$'
            - "--certificate-oidc-issuer"
            - "https://token.actions.githubusercontent.com"
            - "ghcr.io/szl-holdings/killinchu:uds-v0.2.0"
          env:
            - { name: ORGAN_NAME,  value: "killinchu" }
            - { name: ORGAN_IMAGE, value: "ghcr.io/szl-holdings/killinchu:uds-v0.2.0" }
          volumeMounts:
            - { name: cosign-pub, mountPath: /keys, readOnly: true }
      containers:
        - name: killinchu
          image: ghcr.io/szl-holdings/killinchu:uds-v0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
          env:
            # OTLP export so this organ's spans join the cross-organ trace
            - { name: OTEL_EXPORTER_OTLP_ENDPOINT, value: "http://opentelemetry-collector.szl.svc:4318" }
            - { name: OTEL_SERVICE_NAME,           value: "killinchu" }
            - { name: OTEL_TRACES_EXPORTER,        value: "otlp" }
            - { name: SZL_ORGAN,                   value: "killinchu" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: killinchu
  namespace: szl
  labels:
    app: killinchu
spec:
  selector:
    app: killinchu
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
